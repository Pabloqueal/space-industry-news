<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SpacePulse</title>

    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/logo.png">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>

<!-- HERO -->
<header class="hero">

  <div class="logo-container">
    <img src="assets/logo.png" alt="SpacePulse Logo" class="logo">
    <h1>SpacePulse</h1>
  </div>

  <p>AI-powered insights from the global space sector</p>

</header>

<!-- FILTERS -->
<div class="filters">
  <button onclick="filterCategory('All')">All</button>
  <button onclick="filterCategory('Launch')">Launch</button>
  <button onclick="filterCategory('Satellite')">Satellite</button>
  <button onclick="filterCategory('Policy')">Policy</button>
  <button onclick="filterCategory('Economy')">Economy</button>
  <button onclick="filterCategory('Science')">Science</button>
  <button onclick="filterCategory('Mission')">Mission</button>
  <button onclick="filterCategory('History')">History</button>
  <button onclick="filterCategory('Event')">Event</button>
  <button onclick="filterCategory('Technology')">Technology</button>
  <button onclick="filterCategory('Other')">Other</button>
</div>

<!-- SEARCH -->
<div class="search-box">
  <input 
    type="text" 
    id="searchInput" 
    placeholder="🔍 Search space news..."
    onkeyup="searchNews()"
  />
</div>

<!-- MAIN CONTENT -->
<div class="container">

  <!-- COMPANIES -->
  <section class="companies-section">
    <h2>🏆 Top Space Companies</h2>
    <div id="companies-ranking"></div>
  </section>

  <!-- NEWS -->
  <section>
    <h2>📰 Latest News</h2>
    <div id="news-container"></div>
  </section>

  <!-- MAP -->
  <section>
    <h2>📍 Recent Launch Sites</h2>
    <div id="map" style="height:400px; border-radius:12px;"></div>
  </section>

</div>

<!-- SCRIPTS -->
<script src="load_news.js"></script>
<script src="load_trends.js"></script>
<script src="load_companies.js"></script>
<script src="launch_map.js"></script>

</body>
</html>
